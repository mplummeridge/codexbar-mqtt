name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer without the v prefix"
        required: true
        default: "0.2.0"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            version="${GITHUB_REF_NAME#v}"
            tag="$GITHUB_REF_NAME"
          else
            version="${{ inputs.version }}"
            tag="v$version"
          fi
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Verify and build release archives
        run: make release VERSION="${{ steps.version.outputs.version }}" COMMIT="${GITHUB_SHA::12}" DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      - name: Verify checksums
        working-directory: dist
        run: sha256sum -c SHA256SUMS
      - name: Attest release archives
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/codexbar-mqtt-*.tar.gz"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          args=("${{ steps.version.outputs.tag }}"
            dist/codexbar-mqtt-*.tar.gz
            dist/SHA256SUMS
            --generate-notes
            --title "codexbar-mqtt ${{ steps.version.outputs.version }}")
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            args+=(--verify-tag)
          else
            args+=(--target "$GITHUB_SHA")
          fi
          gh release create "${args[@]}"
