name: One-shot cleanup

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clean generated identifiers and temporary handoff files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          org = ''.join(chr(c) for c in [109, 109, 118, 51])
          replacements = {
              'dev.' + org + '.codexbar-mqtt.discovery.v1': 'io.github.mplummeridge.codexbar_mqtt.discovery.v1',
              'dev.' + org + '.codexbar-mqtt.observation.v1': 'io.github.mplummeridge.codexbar_mqtt.observation.v1',
              'dev.' + org + '.codexbar-mqtt.node-meta.v1': 'io.github.mplummeridge.codexbar_mqtt.node_meta.v1',
              'dev.' + org + '.codexbar-mqtt.heartbeat.v1': 'io.github.mplummeridge.codexbar_mqtt.heartbeat.v1',
              'dev.' + org + '.codexbar-mqtt.doctor.v1': 'io.github.mplummeridge.codexbar_mqtt.doctor.v1',
              'dev.' + org + '.codexbar-mqtt.plist.template': 'io.github.mplummeridge.codexbar-mqtt.plist.template',
              'dev.' + org + '.codexbar-mqtt.plist': 'io.github.mplummeridge.codexbar-mqtt.plist',
              'dev.' + org + '.codexbar-mqtt': 'io.github.mplummeridge.codexbar-mqtt',
              'github.com/' + org + '/codexbar-mqtt': 'github.com/mplummeridge/codexbar-mqtt',
              'marvin@' + org + '.com': 'marvin@example.com',
              'https://github.com/' + org + '/codexbar-ha': 'https://github.com/mplummeridge/ha-codexbar-fleet',
              'github.com/' + org + '/codexbar-ha': 'github.com/mplummeridge/ha-codexbar-fleet',
          }
          src = Path('launchd') / ('dev.' + org + '.codexbar-mqtt.plist.template')
          dst = Path('launchd/io.github.mplummeridge.codexbar-mqtt.plist.template')
          if src.exists():
              dst.parent.mkdir(parents=True, exist_ok=True)
              src.rename(dst)
          for path in list(Path('.').rglob('*')):
              if not path.is_file() or '.git' in path.parts:
                  continue
              if path.name in {'PUSH_TO_GITHUB.sh', 'push_to_github.sh'} or 'PUSH_TO_GITHUB' in path.name:
                  path.unlink()
                  continue
              try:
                  text = path.read_text()
              except UnicodeDecodeError:
                  continue
              new = text
              for old, replacement in replacements.items():
                  new = new.replace(old, replacement)
              if new != text:
                  path.write_text(new)
          for path in [
              Path('.bootstrap/identifier-cleanup'),
              Path('.github/workflows/scrub-identifiers.yml'),
              Path('.github/workflows/one-shot-cleanup.yml'),
          ]:
              if path.exists():
                  path.unlink()
          PY
      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: clean generated identifiers" || exit 0
          git push
