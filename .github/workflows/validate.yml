name: validate
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check release artifacts
        run: |
          test -f dist/codexbar-mqtt-0.2.0-darwin-arm64.tar.gz
          test -f dist/codexbar-mqtt-0.2.0-darwin-amd64.tar.gz
          cd dist
          sha256sum -c SHA256SUMS
