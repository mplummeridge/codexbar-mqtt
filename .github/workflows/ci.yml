name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify source
        run: make verify
      - name: Build macOS archives
        run: make release VERSION=0.2.0-dev COMMIT="${GITHUB_SHA::12}" DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      - name: Verify checksums
        working-directory: dist
        run: sha256sum -c SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: codexbar-mqtt-macos-${{ github.sha }}
          path: |
            dist/codexbar-mqtt-*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14
