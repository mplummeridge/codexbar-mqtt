name: Import source

on:
  push:
    branches: [main]
    paths:
      - ".bootstrap/ready"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify and extract source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/source.b64.part-* | tr -d '\n' | base64 --decode > /tmp/source.tar.gz
          echo "4259c8dd26d73e774ec7e7e8e9023d557697f24ec53209fb6dc2f52e6b0de4b9  /tmp/source.tar.gz" | sha256sum -c -
          rm -rf cmd internal testdata docs launchd scripts dist
          rm -f .gitattributes .github/workflows/validate.yml
          tar -xzf /tmp/source.tar.gz
      - name: Commit imported source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: import collector source"
          git push
